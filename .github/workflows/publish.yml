name: Publish to npm

# Reusable: called by release-please.yml only when a release is created (the
# release PR is merged). Publishes the current version to npm via OIDC Trusted
# Publishing. release-please owns the version bump and the git tag/release, so
# there is no version-diff guard or tagging here.
on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — lets npm Trusted Publishing authenticate this run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) + provenance needs a recent npm; Node 20 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public
