name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag after a successful publish
      id-token: write # OIDC — lets npm Trusted Publishing authenticate this run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) + provenance needs a recent npm; Node 20 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish if version changed (and tag the release)
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view @applogico/blipr-mcp version 2>/dev/null || echo "")
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "version $LOCAL_VERSION already published, skipping"
            exit 0
          fi
          echo "publishing $LOCAL_VERSION (published: ${PUBLISHED_VERSION:-none})"
          npm publish --access public

          # Tag the released commit so every published version has a matching
          # vX.Y.Z tag (the version is bumped in a PR, not via `npm version`).
          TAG="v$LOCAL_VERSION"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already on origin, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "tagged + pushed $TAG"
          fi
